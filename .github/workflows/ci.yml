name: Hospital Management System
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm" # Changed from pnpm as package.json uses npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # - name: Test # Removed test step as no tests are defined
      #   run: npm test || true
