name: Hospital Management System
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          # Caching is often handled by pnpm/action-setup or can be configured separately for pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # Removed explicit version to allow package.json to define it

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build

      # - name: Test # Removed test step as no tests are defined
      #   run: pnpm test || true # If tests were to be added, use pnpm

